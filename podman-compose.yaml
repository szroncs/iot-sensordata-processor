version: "3.8"

services:
  mosquitto:
    image: docker.io/library/eclipse-mosquitto:latest
    ports:
      - "1883:1883"
    volumes:
      - ./infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro,z

  # ── Sensor configuration admin UI ─────────────────────────────────────────
  # Serves the web interface for managing the sensor registry (sensors.json).
  # Changes are held in memory until the user clicks Apply, which writes them
  # to the shared config volume.  Restart service-1-python to pick them up.
  sensor-admin:
    build:
      context: ./sensor-admin
    ports:
      - "8080:8080"
    environment:
      - SENSOR_CONFIG_PATH=/app/config/sensors.json
      - ADMIN_HOST=0.0.0.0
      - ADMIN_PORT=8080
    volumes:
      # Read-write: the admin UI is the sole writer of this file
      - ./config:/app/config:z

  # ── IoT sensor data simulator ─────────────────────────────────────────────
  # Reads sensors.json on startup and publishes simulated telemetry over MQTT.
  # Restart this service after applying changes in the sensor admin UI.
  service-1-python:
    build:
      context: ./service-1-python
    depends_on:
      - mosquitto
      - sensor-admin
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
      - DEBUG_CONSOLE_ONLY=false
      - SENSOR_CONFIG_PATH=/app/config/sensors.json
    volumes:
      # Read-only: the simulator only ever reads the config file
      - ./config:/app/config:ro,z

  # ── High-performance data processing engine ───────────────────────────────
  service-2-go:
    build:
      context: ./service-2-go
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-auth-token
      - INFLUX_ORG=thesis_org
      - INFLUX_BUCKET_RAW=raw_data
      - INFLUX_BUCKET_INVALID=invalid_data

  # ── Time-series database ──────────────────────────────────────────────────
  influxdb:
    image: docker.io/library/influxdb:2.0
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=thesis_org
      - DOCKER_INFLUXDB_INIT_BUCKET=raw_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./infrastructure/init-influx.sh:/docker-entrypoint-initdb.d/init.sh:ro,z

  # ── Visualisation dashboard ───────────────────────────────────────────────
  grafana:
    image: docker.io/grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:z
      - ./infrastructure/grafana/dashboards:/var/lib/grafana/dashboards:z
    depends_on:
      - influxdb

volumes:
  influxdb-data:
