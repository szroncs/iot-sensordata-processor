version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:max
    ports:
      - "1883:1883"
    volumes:
      - ./infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  service-1-python:
    build:
      context: ./service-1-python
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
      - INTERVAL_SECONDS=2.0
      - DEBUG_CONSOLE_ONLY=false

  service-2-go:
    build:
      context: ./service-2-go
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
