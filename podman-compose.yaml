version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:max
    ports:
      - "1883:1883"
    volumes:
      - ./infrastructure/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  service-1-python:
    build:
      context: ./service-1-python
    depends_on:
      - mosquitto
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
      - INTERVAL_SECONDS=2.0
      - DEBUG_CONSOLE_ONLY=false

  service-2-go:
    build:
      context: ./service-2-go
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_TOPIC=telemetry/sensors
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_TOKEN=my-super-secret-auth-token
      - INFLUX_ORG=thesis_org
      - INFLUX_BUCKET_VALID=valid_data
      - INFLUX_BUCKET_INVALID=invalid_data

  influxdb:
    image: influxdb:2.0
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=thesis_org
      - DOCKER_INFLUXDB_INIT_BUCKET=valid_data
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=my-super-secret-auth-token
    volumes:
      - ./infrastructure/influxdb-data:/var/lib/influxdb2
      - ./infrastructure/init-influx.sh:/docker-entrypoint-initdb.d/init.sh:ro
