syntax = "proto3";

package iot.v1;

// Timestamp definition
import "google/protobuf/timestamp.proto";

option go_package = "iot-sensordata-processor/service-2-go/gen/iot_pb;iot_pb";

message SensorReading {
  string device_id = 1;
  string location = 2;
  google.protobuf.Timestamp ts = 3;

  // The 'oneof' is a polymorphic wrapper encapsulating multiple msg types
  // into one wrapper msg payload
  oneof payload {
    TemperatureReading temperature = 4;
    HumidityReading humidity = 5;
    GasReading gas = 6;
    DoorReading door = 7;
    AlertReading alert = 8;
  }
}

message TemperatureReading {
  float value = 1;
}

message HumidityReading {
  float value = 1;
}

message GasReading {
  float co2_ppm = 1;
  float lpg_presence = 2;
}

message DoorReading {
  bool is_open = 1;
}

message AlertReading {
  enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_INFO = 1;
    SEVERITY_WARNING = 2;
    SEVERITY_CRITICAL = 3;
  }

  bool active = 1;
  Severity severity = 2;
}
